<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>初恋大戦争 - ホロドリ非公式サイト</title>
  <link rel="stylesheet" href="楽曲一覧.css">
  <link rel="icon" href="../img/favicon.ico">
  <style>
    body { background: transparent; margin: 0; }
    .blurred-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-image: url("../img/cover_art/初恋大戦争.jpg"); background-size: cover; background-position: center; filter: blur(20px) brightness(0.8); transform: scale(1.1); }
    .main-wrapper { position: relative; z-index: 10; }
    .chart-check-section { margin-top: 80px; padding: 0 20px; }
    .section-title { display: block; margin-bottom: 40px; text-align: center; }
  </style>
</head>
<body>
  <div class="blurred-background"></div>
  <div class="main-wrapper">
    <a href="../song.html" class="back-btn"><img src="../back.png" alt="戻る"></a>
    <nav class="navbar">
      <div class="logo">
        <img src="../img/logo.webp" alt="logo">
        <span class="site-title">ホロドリ非公式サイト<br>収録楽曲情報</span>
      </div>
      <ul class="nav-links">
        <li><a href="https://opening.hololive-dreams.com/" target="_blank">公式サイトはこちら</a></li>
        <li><a href="https://x.com/hololive_dreams" target="_blank">公式Xはこちら</a></li>
        <li><a href="https://www.youtube.com/@hololivedreams" target="_blank">公式YouTubeはこちら</a></li>
      </ul>
    </nav>
    <main class="detail-main">
      <div class="song-detail-flex">
        <div class="side-jacket">
          <img src="../img/cover_art/初恋大戦争.jpg" alt="初恋大戦争">
        </div>
        <div class="song-info-area">
          <h1 class="display-title">初恋大戦争</h1>
          <div class="bpm-area"><span class="bpm-label">BPM</span><span class="bpm-value">-</span></div>
          <div class="song-stats-vertical">
            <div class="stat-row ex"><img src="../img/course img/03 expert.png" alt="expert"> <span class="lv-text">Lv.24</span> <span class="combo-text">-combo</span></div>
            <div class="stat-row hd"><img src="../img/course img/02 hard.png" alt="hard"> <span class="lv-text">Lv.17</span> <span class="combo-text">-combo</span></div>
            <div class="stat-row nm"><img src="../img/course img/01 normal.png" alt="normal"> <span class="lv-text">Lv.11</span> <span class="combo-text">-combo</span></div>
            <div class="stat-row es"><img src="../img/course img/00 easy.png" alt="easy"> <span class="lv-text">Lv.6</span> <span class="combo-text">-combo</span></div>
          </div>
        </div>
      </div>
      <section class="chart-check-section">
        <h2 class="section-title">譜面について</h2>
        <div class="comment-box"><p>詳細情報は準備中です。<br>歌唱メンバー: 癒月ちょこ, 白銀ノエル, 雪花ラミィ</p></div>
      </section>
    </main>
  </div>
</body>
</html>
