<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>説明HTMLエディター</title>
  <style>
    body { margin: 0; padding: 28px; background: #1c313b; color: #fff; font-family: Consolas, 'Yu Gothic', monospace; }
    h1 { font-size: 22px; margin: 0 0 14px; font-weight: 500; letter-spacing: 1px; }
    .bar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 16px; }
    button { background: transparent; color: #fff; border: 1px solid #fff; padding: 8px 12px; font: inherit; cursor: pointer; }
    button:hover { background: #fff; color: #1c313b; }
    textarea { width: 100%; height: 66vh; box-sizing: border-box; background: #10242c; color: #fff; border: 1px solid #6fa8b8; padding: 14px; font: 14px/1.65 Consolas, 'Yu Gothic', monospace; resize: vertical; tab-size: 2; }
    .hint { color: #b9dce5; font-size: 13px; line-height: 1.7; margin-top: 12px; }
    .status { color: #a2c4c9; margin-left: 8px; font-size: 13px; }
    code { color: #d6f2ff; }
  </style>
</head>
<body>
  <h1>説明HTMLエディター</h1>
  <div class="bar">
    <button onclick="openHtmlFile()">HTMLを開く</button>
    <button onclick="saveHtmlFile()">HTMLへ保存</button>
    <button onclick="selectAllText()">全部選択</button>
    <span id="status" class="status">HTMLを開いてください</span>
  </div>
  <textarea id="editor" spellcheck="false"></textarea>
  <div class="hint">
    <code>&lt;main class="operation-main" id="content-root"&gt;</code> の中身だけを編集します。<br>
    保存すると、開いたHTMLのmain内だけをこの内容で置き換えます。フェードを使うブロックには <code>fade-in-up</code> を残してください。
  </div>
  <script src="code/content/main-html-editor.js"></script>
</body>
</html>
